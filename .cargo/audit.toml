# cargo-audit configuration.
#
# Last cleanup: 2026-04-26 (plan 0053 PR-6 / GAR-452).
# Originally drafted: 2026-04-22 (plan 0043).
#
# Every entry in `ignore` is a REAL advisory against a dep in our
# Cargo.lock. These are deferred — not silenced — to a downstream
# Linear issue that owns the structural fix. Each block declares the
# advisory ID, the affected crate + version, runtime impact, the
# Linear issue that owns it, the available fix path (when known), and
# the expiration date that forces re-triage.
#
# Policy for adding a new ignore: (1) must reference a specific advisory
# ID, (2) must have a crate + rationale comment, (3) must have a
# concrete Linear issue as owner (not a "Lote" marker), (4) must declare
# fix availability honestly, (5) must have an expiration date.
#
# SYNC NOTE — `audit.toml` vs `deny.toml` (HONEST asymmetry):
#
#   * `audit.toml` controls vulnerabilities flagged by `cargo audit`.
#     It carries every RUSTSEC ID that would otherwise make `cargo audit`
#     exit non-zero on `Cargo.lock`.
#   * `deny.toml` controls advisories flagged by `cargo deny`. It carries
#     the same RUSTSEC wasmtime IDs (mandatory sync) PLUS 5 additional
#     `unmaintained-only` advisories (daemonize, derivative, fxhash,
#     instant, paste) that `cargo audit` auto-classifies as "allowed
#     warnings" and does NOT require explicit ignore.
#   * **Mandatory sync on wasmtime IDs only.** When GAR-454 (Q7b) bumps
#     wasmtime to ≥ 40.0.4 / ≥ 41.0.4, ALL 15 wasmtime IDs below MUST be
#     dropped from BOTH files atomically.
#   * The 5 unmaintained-only IDs in `deny.toml` are intentionally NOT
#     mirrored here. Do not "fix" the asymmetry by mass-mirroring; that
#     would change runtime behavior of `cargo audit`.

[advisories]
ignore = [
    # =========================================================================
    # GAR-456 — sqlx-mysql lockfile leak (rsa Marvin Attack timing sidechannel)
    # =========================================================================
    # rsa 0.9.10 — Marvin Attack (timing sidechannel on RSA decrypt).
    # Status: ignore RETIDO honestamente. Defense-in-depth aplicado em
    # plan 0053 PR-4 (GAR-450, 2026-04-25): `default-features = false` em
    # todas as 5 declarações de sqlx, removendo `mysql` feature do active
    # tree. Mas o meta-crate upstream `sqlx 0.8.6` declara `sqlx-mysql`
    # como `optional = true` na sua dep section, então `cargo audit` walks
    # `Cargo.lock` e continua vendo `rsa 0.9.10` (transitivo). JWT paths
    # do GarraRUST usam HS256 via `ring` — Marvin code path NÃO reachable.
    # Fix estrutural: refactor para `sqlx-postgres` direto OU sqlx 0.9.
    # Tracked by: GAR-456. Expires: 2026-07-31.
    "RUSTSEC-2023-0071",

    # =========================================================================
    # GAR-454 — wasmtime 28 (15 advisories, includes 2 CRITICAL severity 9.0)
    # =========================================================================
    # Temporary ignores — NOT fixed structurally. Tracked by GAR-454.
    # wasmtime 28.0.1 still present in Cargo.lock (verified empirically
    # on 2026-04-26 via `cargo metadata --locked`). Pulled transitively
    # via `garraia-plugins → wasmtime/wasmtime-wasi/wiggle 28.0.1`.
    #
    # Fix available via `wasmtime >= 40.0.4` or `>= 41.0.4`, but the bump
    # touches `garraia-plugins` runtime/plugin isolation surface and
    # crosses several major versions (28 → 40+). Requires
    # @security-auditor review of plugin isolation BEFORE structural fix;
    # therefore deferred to GAR-454 with dedicated plan
    # (`plans/0050.4-wasmtime-upgrade.md`, to be authored).
    #
    # Severity breakdown:
    #   * RUSTSEC-2026-0095 / 0096 — CRITICAL (CVSS 9.0)
    #   * RUSTSEC-2026-0020 / 0021 / 0093 — Medium (6.9)
    #   * RUSTSEC-2026-0091 / 0094 — Medium (6.1)
    #   * RUSTSEC-2026-0089 / 0092 — Medium (5.9)
    #   * RUSTSEC-2026-0085 — Medium (5.6)
    #   * RUSTSEC-2026-0087 — Medium (4.1)
    #   * RUSTSEC-2026-0086 / 0088 — Low (2.3)
    #   * RUSTSEC-2025-0046 / 0118 — pre-existing (originally documented
    #     in plan 0043; carried forward)
    #
    # Expires: 2026-08-31 (15 IDs together — atomic re-triage gate).
    "RUSTSEC-2025-0046",  # fd_renumber WASIp1 host panic
    "RUSTSEC-2025-0118",  # unsound shared linear memory API
    "RUSTSEC-2026-0020",  # guest-controlled resource exhaustion (WASI)
    "RUSTSEC-2026-0021",  # guest-controlled resource exhaustion (WASI #2)
    "RUSTSEC-2026-0085",
    "RUSTSEC-2026-0086",
    "RUSTSEC-2026-0087",
    "RUSTSEC-2026-0088",
    "RUSTSEC-2026-0089",
    "RUSTSEC-2026-0091",
    "RUSTSEC-2026-0092",
    "RUSTSEC-2026-0093",
    "RUSTSEC-2026-0094",
    "RUSTSEC-2026-0095",  # CRITICAL (9.0)
    "RUSTSEC-2026-0096",  # CRITICAL (9.0)

    # =========================================================================
    # GAR-455 — rustls-webpki residuals (serenity 0.12.5 + aws-smithy 1.1.12)
    # =========================================================================
    # Plan 0053 PR-1 (GAR-447, 2026-04-25) applied the lockfile-only patch
    # `cargo update -p rustls-webpki@0.103.9 --precise 0.103.13`, closing
    # the 4 IDs below on the **production hot path** (rustls 0.23 chain:
    # reqwest, hyper-rustls, tokio-rustls 0.26).
    #
    # The 4 IDs REMAIN ignored here because two legacy chains in
    # `Cargo.lock` still trigger them with no upstream fix:
    #
    #   * `rustls-webpki 0.102.8` (all 4 IDs) — via serenity 0.12.5 →
    #     tokio-tungstenite 0.21 → rustls 0.22. serenity 0.12.5 is the
    #     latest stable; line 0.102.x is EOL (no 0.102.10+).
    #   * `rustls-webpki 0.101.7` (3 of 4 IDs: 0098, 0099, 0104) — via
    #     aws-smithy-http-client 1.1.12 → rustls 0.21. Latest stable;
    #     feature-gated behind `storage-s3`.
    #
    # `cargo-audit` 0.22.x does NOT support per-(advisory, version)
    # ignore. If a future advisory affects ONLY the 0.103.x line, this
    # block MUST be revisited — the ignore would silence a real prod
    # regression.
    #
    # Tracked by: GAR-455. Expires: 2026-07-31.
    "RUSTSEC-2026-0049",  # CRL matching — patched in 0.103.10
    "RUSTSEC-2026-0098",  # URI name constraints — patched in 0.103.12
    "RUSTSEC-2026-0099",  # wildcard in name-constrained — patched in 0.103.12
    "RUSTSEC-2026-0104",  # reachable panic in CRL parsing — patched in 0.103.13

    # =========================================================================
    # GAR-437 carve-out — unsound warnings (glib + lru + rand)
