# cargo-audit configuration (plan 0043, 2026-04-22).
#
# Every entry in `ignore` is a REAL advisory against a dep in our
# Cargo.lock. These are deferred — not silenced — to Lote B-2 of the
# autonomous session (see plans/synchronous-baking-hippo.md §5 Lote B).
# B-2 will address each via version bump + security-auditor review of
# the touched crypto/parsing surface, then remove the entry from this
# file.
#
# SYNC NOTE: this file and `/deny.toml` are parallel universes.
# `cargo-audit` reads `.cargo/audit.toml`; `cargo-deny` reads
# `deny.toml`. As of 2026-04-22 both files share the same 2 wasmtime
# advisory IDs (RUSTSEC-2025-0046, RUSTSEC-2025-0118). When B-2 bumps
# wasmtime, BOTH files must be updated. See F-5 in the plan 0043
# security-auditor review (PR #57).
#
# ALL entries expire 2026-05-20 (4 weeks). At that point: either B-2
# closed them, or they get re-triaged explicitly.
#
# Policy for adding a new ignore: (1) must reference a specific
# advisory ID, (2) must have a one-line crate + rationale comment,
# (3) must have a downstream owner (Linear issue or Lote marker).

[advisories]
ignore = [
    # --- Vulnerabilities (deny-by-default) — 9 unique IDs ---

    # rsa 0.9.10 — Marvin Attack (timing sidechannel on RSA decrypt).
    #
    # **Status (plan 0053 PR-4, GAR-450, 2026-04-25):** ignore RETIDO honestamente.
    # PR-4 aplicou `default-features = false` em todas as 5 declarações de sqlx
    # (workspace + 4 crates), removendo o `mysql` feature do active dep tree —
    # `cargo tree -i sqlx-mysql --target all` retorna "nothing to print" e
    # `cargo tree -e features -p sqlx | grep mysql` é vazio. Defesa em profundidade:
    # qualquer `use sqlx::mysql::*` futuro agora exige opt-in explícito de feature.
    #
    # **Por que o ignore CONTINUA:** o meta-crate upstream `sqlx 0.8.6` declara
    # `sqlx-mysql` (e `sqlx-sqlite`) na sua dep section como `optional = true`.
    # Cargo lockfile inclui TODAS as deps declaradas (mesmo optional não-ativas)
    # para reprodutibilidade. `cargo audit` walks `Cargo.lock`, não o active
    # feature tree, então continua vendo `rsa 0.9.10` (transitivo via
    # `sqlx → sqlx-mysql`) e dispara RUSTSEC-2023-0071. O fix arquitetural
    # estrutural seria refactor para usar `sqlx-postgres` direto (sem o
    # meta-crate) ou esperar sqlx 0.9 (que pode mudar essa estrutura). Tracked
    # em **GAR-450-followup** (a criar quando este PR abrir). Expiration
    # refrescada para 2026-07-31.
    #
    # GarraRUST JWT paths usam HS256 via `ring` (HMAC-SHA256), NÃO RSA decrypt
    # — a Marvin attack code path não é reachable nos handlers atuais. Risk
    # operacional zero; este ignore é puramente um workaround para a
    # discrepância entre lockfile e active tree.
    "RUSTSEC-2023-0071",

    # wasmtime 28 — `fd_renumber` WASIp1 host panic. We ship WASM
    # sandbox in garraia-plugins; must bump to fixed version in B-2
    # WITH security-auditor review of plugin isolation surface.
    "RUSTSEC-2025-0046",

    # NOTE: RUSTSEC-2025-0111 (tokio-tar PAX file smuggling) was closed by
    # plan 0053 PR-3 (GAR-449). Resolution path: testcontainers 0.23 → 0.27.3
    # + testcontainers-modules 0.11 → 0.15.0, which replaces tokio-tar 0.3.1
    # with astral-tokio-tar 0.6.0 (the *fixed* version of the replacement —
    # plan-pivot doc'd in plans/0053 §Amendment 2026-04-25 because the
    # intermediate path 0.25/0.13 pulled astral-tokio-tar 0.5.6 which had its
    # own RUSTSEC-2026-0066). tokio-tar absent from Cargo.lock; ignore removed.

    # wasmtime 28 — unsound shared linear memory API. Same bump as
    # RUSTSEC-2025-0046; same security review gate.
    "RUSTSEC-2025-0118",

    # --- rustls-webpki residuals (GAR-447 PR-1, plan 0053) ---
    #
    # PR-1 (commit landing this comment block) applied the lockfile-only
    # patch `cargo update -p rustls-webpki@0.103.9 --precise 0.103.13`,
    # closing the 4 advisories below on the **production hot path**
    # (rustls 0.23 chain: reqwest, hyper-rustls, tokio-rustls 0.26).
    #
    # The 4 IDs REMAIN ignored here because two legacy chains in
    # Cargo.lock still trigger them and have no upstream fix:
    #
    #   A) rustls-webpki 0.102.8 (all 4 IDs)
    #      via: serenity 0.12.5 → tokio-tungstenite 0.21
    #           → rustls 0.22 → rustls-webpki 0.102.8
    #      blocker: serenity 0.12.5 is the latest stable on crates.io;
    #               line rustls-webpki 0.102.x is EOL (no 0.102.10+).
    #
    #   B) rustls-webpki 0.101.7 (3 of 4 IDs: 0098, 0099, 0104)
    #      via: aws-smithy-http-client 1.1.12 → rustls 0.21
    #           → rustls-webpki 0.101.7
    #      blocker: aws-smithy-http-client 1.1.12 is the latest stable
    #               on crates.io; feature-gated behind `storage-s3`.
    #
    # `cargo-audit` 0.22.x does NOT support per-(advisory, version)
    # ignore — only per advisory ID. Aggressive `[patch.crates-io]`
    # overrides for tokio-tungstenite/serenity/aws-smithy were
    # rejected as too risky for a security PR (would force semver-
    # incompatible bumps that could break Discord and S3 paths).
    #
    # Residual tracking: GAR-455 (Q7c) under GAR-430.
    # Expiration target for these 4 IDs: 2026-07-31 (will be refreshed
    # in PR-6 / GAR-452 once the lote-wide audit.toml cleanup lands).
    #
    # If a future advisory affects ONLY the 0.103.x line, this block
    # MUST be revisited: the ignore would silence a real prod regression.

    # rustls-webpki — CRL matching logic. Patched in 0.103.10. Hot path
    # 0.103.13 is fixed. Residual: 0.102.8 only (serenity chain).
    "RUSTSEC-2026-0049",

    # rustls-webpki — URI name constraints. Patched in 0.103.12. Hot
    # path 0.103.13 is fixed. Residual: 0.102.8 + 0.101.7 chains.
    "RUSTSEC-2026-0098",

    # rustls-webpki — wildcard in name-constrained certs. Patched in
    # 0.103.12. Hot path 0.103.13 is fixed. Residual: 0.102.8 + 0.101.7.
    "RUSTSEC-2026-0099",

    # rustls-webpki — reachable panic in CRL parsing. Patched in
    # 0.103.13. Hot path 0.103.13 is fixed. Residual: 0.102.8 + 0.101.7.
    "RUSTSEC-2026-0104",

    # --- Unsound warnings (deny due to --deny unsound) — 3 unique IDs ---

    # glib — `VariantStrIter` unsound Iterator impls. Pulled by Tauri
    # surface (garraia-desktop), which is excluded from CI builds. Low
    # runtime risk in server deployments. B-2 decision: bump glib or
    # gate behind `desktop` feature for cargo-audit.
    "RUSTSEC-2024-0429",

    # lru — `IterMut` stacked-borrows violation. Pulled transitively;
    # bump to fixed version in B-2 and confirm no downstream breakage.
    "RUSTSEC-2026-0002",

    # rand — custom logger unsoundness in `rand::rng()`. We use rand
    # broadly; B-2 must audit call sites before bump (patch versions
    # between 0.8 and 0.9 family are semver-incompatible).
    "RUSTSEC-2026-0097",

    # NOTE: RUSTSEC-2026-0105 (core2 0.4.0 unmaintained + yanked) was
    # closed by plan 0053 PR-5 (GAR-451). Resolution path: feature-gated
    # AVIF off in `crates/garraia-media/Cargo.toml` (`image = { version
    # = "0.25", default-features = false, features = ["png", "jpeg",
    # "webp", "gif"] }`) AND removed dead-dep `imageproc 0.25` (zero
    # `imageproc::` references anywhere in the workspace; was reactivating
    # AVIF via cargo feature unification because it pulled `image` with
    # defaults enabled). Result: core2, bitstream-io, rav1e, ravif all
    # absent from `Cargo.lock`. Ignore removed.
]
