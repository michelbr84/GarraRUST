    "RUSTSEC-2024-0429",

    # lru 0.12.5 — `IterMut` stacked-borrows violation. Pulled
    # transitively via `aws-sdk-s3 1.119.0 → garraia-storage` (feature
    # `storage-s3`). Verified 2026-04-26: `cargo audit` reports lru
