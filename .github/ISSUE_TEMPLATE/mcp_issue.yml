name: MCP Issue
description: Issues related to Model Context Protocol
title: "[MCP] "
labels: ["mcp", "critical"]

body:

  - type: textarea
    id: problem
    attributes:
      label: MCP Problem Description
      placeholder: MCP tool not responding, connection error, etc.
    validations:
      required: true

  - type: textarea
    id: tool
    attributes:
      label: Tool affected
      placeholder: generate_tts_audio, memory_search, etc.

  - type: textarea
    id: request
    attributes:
      label: MCP Request JSON
      render: json

  - type: textarea
    id: response
    attributes:
      label: MCP Response JSON
      render: json

  - type: textarea
    id: logs
    attributes:
      label: Logs
      render: shell