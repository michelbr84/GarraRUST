name: Bug Report
description: Report a bug or unexpected behavior
title: "[BUG] "
labels: ["bug"]
assignees: []

body:

  - type: markdown
    attributes:
      value: |
        Describe the bug clearly and completely.

  - type: input
    id: version
    attributes:
      label: GarraRUST Version
      placeholder: v0.1.0
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: Windows / Linux / Docker / Server
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Run ...
        2. Send command ...
        3. Observe error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: What should happen
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      placeholder: What actually happens
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error messages
      render: shell