name: Security — cargo audit

# Plan 0026 (GAR-411 L5). Nightly scheduled scan of the workspace's Cargo
# lockfile against the RustSec advisory database. Runs off the PR path to
# avoid gating merges on third-party advisory churn; failures surface as
# a red run in the Actions tab (and via the default GitHub notification
# channel) for operator triage.
#
# Implementation note (plan 0026 review F-2A / CR-MEDIUM-1): the plan
# considered `rustsec/audit-check@v2` but chose `cargo install` + `cargo
# audit` to zero external-action supply-chain surface. Trade-off:
# no SARIF upload to the GitHub Security tab; failure visibility is
# limited to the Actions tab + default notification channel.

on:
  schedule:
    # 07:00 UTC nightly = 03:00 America/New_York — after the main CI
    # quiet window, avoiding contention with the push-triggered job.
    - cron: '0 7 * * *'
  workflow_dispatch: {}

# Explicit least-privilege permissions (plan 0026 security audit F-2B).
# The job only needs to read the checked-out Cargo.lock — no contents
# write, no security-events write (we're not uploading SARIF).
permissions:
  contents: read

concurrency:
  # Fixed group name (plan 0026 review F-6 / NIT-2): `${{ github.ref }}`
  # would split schedule vs. manual-dispatch-from-branch into different
  # groups, defeating the intent of "only one audit at a time". Fixed
  # string serializes all runs across all refs.
  group: cargo-audit
  # Scheduled runs MUST complete rather than be canceled by a manual
  # dispatch (security signal should not be preemptable by a dispatcher
  # who may simply be testing the workflow).
  cancel-in-progress: false

jobs:
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        # `--locked` pins the transitive deps of cargo-audit itself so
        # this job doesn't silently drift when a new cargo-audit release
        # lands. Version range `^0.21` tracks the 0.21.x line; bump
        # deliberately when upstream breaks the CLI contract (flags,
        # exit codes, report format).
        run: cargo install --locked --version '^0.21' cargo-audit

      - name: Run cargo audit
        # `cargo audit` already fails on any advisory (Informational,
        # Low, Medium, High, Critical) by default. The `--deny` flags
        # widen the failure set:
        #   --deny unsound: fail on RustSec "unsound" soundness-bug
        #                   advisories even if not yet a vuln.
        #   --deny yanked:  fail if any crate in Cargo.lock is yanked
        #                   from crates.io (strong supply-chain signal).
        run: cargo audit --deny unsound --deny yanked
