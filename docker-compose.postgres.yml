# Compose override: add Postgres + Supabase-compatible setup.
# Usage: docker compose -f docker-compose.yml -f docker-compose.postgres.yml up
#
# Requires GAR-302 (DB Abstraction + optional Postgres) to be implemented
# before GarraIA can actually use the DATABASE_URL below.
# Until then, GarraIA will continue using its embedded SQLite database.

services:
  garraia:
    environment:
      - DATABASE_URL=postgres://garraia:${POSTGRES_PASSWORD:-garraia}@postgres:5432/garraia
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: garraia
      POSTGRES_USER: garraia
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-garraia}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Optional: seed SQL files placed in ./migrations/seed/
      # - ./migrations/seed:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U garraia -d garraia"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
