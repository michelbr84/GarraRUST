# Default values for garraia Helm chart

replicaCount: 1

image:
  repository: ghcr.io/michelbr84/garraia
  tag: ""  # Defaults to Chart.appVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 3888
  targetPort: 3888

ingress:
  enabled: false
  className: nginx
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: garraia.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: garraia-tls
  #    hosts:
  #      - garraia.example.com

resources:
  limits:
    cpu: "1"
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

persistence:
  data:
    enabled: true
    accessMode: ReadWriteOnce
    size: 1Gi
    storageClass: ""
  credentials:
    enabled: true
    accessMode: ReadWriteOnce
    size: 100Mi
    storageClass: ""

env:
  GARRAIA_LOG_LEVEL: info

# Sensitive values — reference a Kubernetes Secret
secretEnv:
  # GARRAIA_VAULT_PASSPHRASE: ""
  # GARRAIA_JWT_SECRET: ""
  # ANTHROPIC_API_KEY: ""

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

nodeSelector: {}
tolerations: []
affinity: {}
