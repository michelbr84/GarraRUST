# Configuração básica do GarraIA para implantação com Docker
# Utiliza provedores em nuvem (Anthropic, OpenAI) e conecta-se a APIs externas.

gateway:
  # Vincula a todas as interfaces dentro do container
  host: "0.0.0.0"
  port: 3888

llm:
  # Anthropic Claude (requer ANTHROPIC_API_KEY)
  claude:
    provider: anthropic
    model: claude-sonnet-4-6
    # api_key resolvida automaticamente via ANTHROPIC_API_KEY

  # OpenRouter — acesso a múltiplos modelos com um único token (requer OPENROUTER_API_KEY)
  # Útil como fallback pois agrega vários providers internamente.
  openrouter:
    provider: openrouter
    model: anthropic/claude-3.5-sonnet
    # api_key resolvida via OPENROUTER_API_KEY

  # OpenAI (requer OPENAI_API_KEY)
  # openai:
  #   provider: openai
  #   model: gpt-4o

agent:
  system_prompt: "Você é o GarraIA, um assistente de inteligência artificial útil executando dentro de um container Docker."
  default_provider: claude
  # GAR-210: fallback automático — se 'claude' retornar 429/5xx, tenta 'openrouter' na ordem.
  fallback_providers:
    - openrouter

channels:
  # Telegram (requer variável de ambiente TELEGRAM_BOT_TOKEN)
  telegram:
    type: telegram
    enabled: true
    # bot_token é resolvido automaticamente a partir da variável de ambiente TELEGRAM_BOT_TOKEN

  # Discord (requer variáveis de ambiente DISCORD_BOT_TOKEN e DISCORD_APP_ID)
  discord:
    type: discord
    enabled: true
    # bot_token e application_id são resolvidos automaticamente a partir das variáveis de ambiente