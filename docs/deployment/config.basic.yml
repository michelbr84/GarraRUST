# Configuração básica do GarraIA para implantação com Docker
# Utiliza provedores em nuvem (Anthropic, OpenAI) e conecta-se a APIs externas.

gateway:
  # Vincula a todas as interfaces dentro do container
  host: "0.0.0.0"
  port: 3888

llm:
  # Anthropic Claude (requer variável de ambiente ANTHROPIC_API_KEY)
  claude:
    provider: anthropic
    # Use um ID de modelo válido (ex: claude-3-5-sonnet-20240620)
    model: claude-3-5-sonnet-20240620
    # api_key é resolvida automaticamente a partir da variável de ambiente ANTHROPIC_API_KEY

  # OpenAI (requer variável de ambiente OPENAI_API_KEY)
  # openai-gpt4:
  #   provider: openai
  #   model: gpt-4o

agent:
  system_prompt: "Você é o GarraIA, um assistente de inteligência artificial útil executando dentro de um container Docker."
  default_provider: claude

channels:
  # Telegram (requer variável de ambiente TELEGRAM_BOT_TOKEN)
  telegram:
    type: telegram
    enabled: true
    # bot_token é resolvido automaticamente a partir da variável de ambiente TELEGRAM_BOT_TOKEN

  # Discord (requer variáveis de ambiente DISCORD_BOT_TOKEN e DISCORD_APP_ID)
  discord:
    type: discord
    enabled: true
    # bot_token e application_id são resolvidos automaticamente a partir das variáveis de ambiente