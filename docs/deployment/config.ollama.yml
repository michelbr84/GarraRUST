# Configuração do GarraIA para implantação local com Docker e Ollama
# Conecta-se ao serviço local 'ollama' na mesma rede Docker.

gateway:
  # Vincula a todas as interfaces dentro do container
  host: "0.0.0.0"
  port: 3888

llm:
  # Serviço local do Ollama
  ollama-local:
    provider: ollama
    # Ajuste o modelo conforme necessário (deve ser baixado primeiro no container Ollama)
    model: llama3.1
    # Aponta para o serviço 'ollama' definido no docker-compose.ollama.yml
    base_url: "http://ollama:11434"

agent:
  system_prompt: "Você é o GarraIA, um assistente de inteligência artificial executando localmente através do Ollama."
  default_provider: ollama-local

# Habilite os canais conforme necessário
channels:
  telegram:
    type: telegram
    enabled: false
    # bot_token é resolvido automaticamente a partir da variável de ambiente TELEGRAM_BOT_TOKEN