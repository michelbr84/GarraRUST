    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "OpenSSL",
    "BSL-1.0",
    "CC0-1.0",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
    # NCSA â€” University of Illinois/NCSA Open Source License. OSI-approved,
    # FSF Free/Libre. Transitive via libfuzzer-sys â†’ rav1e â†’ ravif â†’ image
    # (garraia-media image pipeline). Plan 0050 Lote 1 / GAR-431.
