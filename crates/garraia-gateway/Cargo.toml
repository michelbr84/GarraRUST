[package]
name = "garraia-gateway"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "WebSocket gateway and control plane for GarraIA"

[dependencies]
garraia-common = { workspace = true }
garraia-config = { workspace = true }
garraia-channels = { workspace = true, features = ["discord", "telegram", "slack", "whatsapp", "imessage"] }
garraia-agents = { workspace = true, features = ["mcp"] }
garraia-db = { workspace = true }
garraia-security = { workspace = true }
garraia-skills = { workspace = true }

tokio = { workspace = true }
dotenvy = { workspace = true }
axum = { workspace = true }
tower = { workspace = true }
tower-http = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true }
dashmap = { workspace = true }
futures = { workspace = true }
chrono = { workspace = true }
rusqlite = { workspace = true }
base64 = { workspace = true }
ring = { workspace = true }
dirs = "6"
governor = "0.8"
tower_governor = "0.8"
async-trait = { workspace = true }
anyhow = { workspace = true }

[features]
default = []
mcp-http = ["garraia-agents/mcp-http"]

[dev-dependencies]
wiremock = "0.6"
tokio-tungstenite = "0.26"
tokio = { workspace = true }
futures = { workspace = true }
serde_json = { workspace = true }
reqwest = { workspace = true }
