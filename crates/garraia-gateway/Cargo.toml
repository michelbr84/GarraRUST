[package]
name = "garraia-gateway"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "WebSocket gateway and control plane for GarraIA"

[dependencies]
garraia-common = { workspace = true }
garraia-config = { workspace = true }
garraia-glob = { workspace = true }
garraia-channels = { workspace = true, features = ["discord", "telegram", "slack", "whatsapp", "imessage", "openclaw"] }
garraia-agents = { workspace = true, features = ["mcp"] }
garraia-runtime = { workspace = true }
garraia-db = { workspace = true }
garraia-security = { workspace = true }
garraia-skills = { workspace = true }
garraia-voice = { workspace = true }
garraia-telemetry = { path = "../garraia-telemetry", optional = true }
# garraia-auth — wired only when the `auth-v1` feature is enabled (GAR-391b).
# The full AppState wiring lives in 391c; in 391b the endpoint runs as an
# isolated subrouter behind the feature flag.
garraia-auth = { workspace = true, optional = true }
secrecy = { version = "0.10", optional = true }

# Telegram (for voice handler)
teloxide = { workspace = true }

tokio = { workspace = true }
dotenvy = { workspace = true }
axum = { workspace = true }
tower = { workspace = true }
tower-http = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true }
dashmap = { workspace = true }
futures = { workspace = true }
chrono = { workspace = true }
rusqlite = { workspace = true }
base64 = { workspace = true }
ring = { workspace = true }
jsonwebtoken = { workspace = true }
dirs = "6"
governor = "0.8"
tower_governor = "0.8"
async-trait = { workspace = true }
anyhow = { workspace = true }
reqwest = { version = "0.12", features = ["json", "rustls-tls", "gzip", "brotli", "deflate"], default-features = false }
filetime = "0.2"
axum-server = { version = "0.7", features = ["tls-rustls"], optional = true }

[features]
default = ["telemetry"]
mcp-http = ["garraia-agents/mcp-http"]
tls = ["dep:axum-server"]
telemetry = ["dep:garraia-telemetry"]
# GAR-391b — POST /v1/auth/login under an isolated subrouter. The full
# AppState wiring (extractor, RequirePermission, refresh/logout endpoints)
# lands in 391c; this feature exists so 391b can ship the verify path
# end-to-end without touching the default build.
auth-v1 = ["dep:garraia-auth", "dep:secrecy"]

[dev-dependencies]
tempfile = "3"
wiremock = "0.6"
tokio-tungstenite = "0.26"
tokio = { workspace = true }
futures = { workspace = true }
serde_json = { workspace = true }
reqwest = { workspace = true }
tracing-test = "0.2"
tower = { workspace = true, features = ["util"] }
# GAR-391b auth-v1 endpoint integration test (gated by `cfg(feature = "auth-v1")`).
# The test boots a pgvector container, applies workspace migrations 001..009,
# constructs the auth subrouter, and validates the byte-identical 401 anti-
# enumeration property across 3 failure modes.
testcontainers = "0.23"
testcontainers-modules = { version = "0.11", features = ["postgres"] }
sqlx = { version = "0.8", features = ["runtime-tokio", "postgres", "uuid", "chrono"] }
secrecy = "0.10"
garraia-workspace = { path = "../garraia-workspace" }
garraia-auth = { workspace = true }
anyhow = { workspace = true }
http-body-util = "0.1"
chrono = { workspace = true }
uuid = { workspace = true }
password-hash = "0.5"
argon2 = "0.5"
tracing-subscriber = { workspace = true }
